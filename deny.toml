[advisories]
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"
notice = "warn"

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
]
allow-osi-fsf-free = "either"
copyleft = "warn"
unlicensed = "deny"

[licenses.private]
ignore = false

[bans]
multiple-versions = "warn"
